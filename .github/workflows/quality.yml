# 中文：CI 质量门，运行 lint、测试、场景回归、benchmark 和 audit verification。
# English: CI quality gate running lint, tests, scenario regression, benchmark, and audit verification.

name: quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONLINT_VERSION: "1.7.12"
  UV_CACHE_DIR: .uv-cache
  UV_PYTHON_DOWNLOADS: never
  UV_VERSION: "0.11.8"

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "$RUNNER_TEMP/actionlint.tar.gz"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $RUNNER_TEMP/actionlint.tar.gz" \
            | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP"

      - name: Run actionlint
        run: |
          "$RUNNER_TEMP/actionlint"

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-local-path: .uv-cache

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run quality gate
        run: make quality PYTHON=.venv/bin/python

      - name: Upload scenario and benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            artifacts/reports/scenario_report.json
            artifacts/reports/scenario_report.md
            artifacts/reports/benchmark_report.json
            artifacts/events/scenario_events.jsonl
            artifacts/audit/scenario_audit.jsonl
          if-no-files-found: warn
          retention-days: 14
