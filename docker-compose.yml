# 中文：本地服务编排配置，用于启动 API 控制面和 Prometheus 观测服务。
# English: Local service orchestration for the API control plane and Prometheus observability service.

services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    command: python -m origami.api.app
    environment:
      PYTHONPATH: /workspace/src
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./configs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
