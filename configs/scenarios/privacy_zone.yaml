  privacy_zones: [patient_room]
  camera_enabled: true
  fleet_context:
    nearby_robots: 0

expected:
  final_move: east
  camera_enabled: false
  seom_passed: false
  audit_valid: true
  expected_violations: [C05_privacy_zone]
  gradient_mask: reduced
  notes: Privacy rule should disable camera while preserving safe route progress.
