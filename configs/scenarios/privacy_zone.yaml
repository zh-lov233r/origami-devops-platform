# 中文：隐私区域场景，验证 SEOM 会关闭相机但不一定停止移动。
# English: Privacy-zone scenario verifying SEOM disables camera without necessarily stopping motion.

version: 1
id: privacy_zone
name: Privacy Zone
description: Robot enters a camera-restricted zone while navigating to the dropoff area.
tags:
  - privacy
  - seom
  - compliance

observation:
  mission_type: carry_go_delivery
  position: [0, 0]
  target: [1, 0]
  sensor_bias: 0.01
  payload_kg: 2.0
