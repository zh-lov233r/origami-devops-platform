# 中文：未认证交付场景，验证 handoff 需要收件人认证。
# English: Unauthenticated handoff scenario verifying recipient authentication is required.

version: 1
id: handoff_without_auth
name: Handoff Without Auth
description: Robot reaches payload handoff but the recipient has not authenticated.
tags:
