    nearby_robots: 0

expected:
  final_move: hold
  final_speed_mps: 0.0
  seom_passed: false
  audit_valid: true
  expected_violations: [C10_handoff_auth]
  expected_life_safety_violations: [C10_handoff_auth]
  gradient_mask: zero
  requires_human_review: true
  notes: Payload handoff must not proceed without recipient authentication.
